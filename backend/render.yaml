services:
  - type: web
    name: physical-ai-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python -m nltk.downloader punkt
    startCommand: gunicorn src.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LLM_PROVIDER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: NEON_CONNECTION_STRING
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: CHUNK_SIZE
        value: 512
      - key: CHUNK_OVERLAP
        value: 128
      - key: TOP_K_RESULTS
        value: 5
      - key: SIMILARITY_THRESHOLD
        value: 0.7
    healthCheckPath: /health
    autoDeploy: true
